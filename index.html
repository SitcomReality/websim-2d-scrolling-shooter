<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Scrolling Shooter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="800" height="600"></canvas>
        <div id="ui-overlay">
            <div id="score-display">Score: 0</div>
            <div id="health-bar">
                <div id="health-fill"></div>
            </div>
            <div id="xp-bar">
                <div id="xp-fill"></div>
            </div>
            <div id="level-display">Level 1</div>
            <button id="start-btn">Start Game</button>
            <button id="restart-btn" style="display: none;">Restart</button>
        </div>
    </div>
    
    <div id="level-up-overlay">
        <div id="level-up-message">
            LEVEL UP!<br>
            <span id="level-up-level" style="font-size: 36px;">2</span>
        </div>
        <button id="continue-btn">Continue</button>
    </div>
    
    <div id="upgrade-selection-overlay">
        <div id="upgrade-selection-content">
            <h2 id="upgrade-title">Choose an Upgrade</h2>
            <div id="upgrade-choices"></div>
        </div>
    </div>
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.158.0/build/three.module.js"
        }
    }
    </script>
    
    <script type="module" src="game.js"></script>

</body>
</html>

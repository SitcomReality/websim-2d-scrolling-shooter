<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Scrolling Shooter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <div id="health-container">
            <div id="health-bar">
                <div id="health-fill"></div>
                <div id="health-value">100 / 100</div>
            </div>
            <div id="score-display">Score: 0</div>
        </div>
        
        <div id="left-panel">
            <h3>Ship Stats</h3>
            <div id="ship-stats-list"></div>
        </div>
        
        <canvas id="game-canvas" width="800" height="600"></canvas>
        
        <div id="right-panel">
            <h3>Unlocked Enemies</h3>
            <div id="unlocked-enemies-list"></div>
        </div>
        
        <div id="dev-panel">
            <h3>Dev Tools</h3>
            <button id="dev-level-up" class="dev-button">Instant Level Up</button>
            <button id="dev-max-health" class="dev-button">Max Health</button>
            <button id="dev-god-mode" class="dev-button">God Mode</button>
            <button id="dev-clear-enemies" class="dev-button">Clear Enemies</button>
        </div>
        
        <div id="xp-container">
            <div id="xp-bar">
                <div id="xp-fill"></div>
                <div id="xp-value">0 / 100</div>
            </div>
            <div id="level-display">Level 1</div>
        </div>
        
        <div id="ui-overlay">
            <button id="start-btn">Start Game</button>
            <button id="restart-btn" style="display: none;">Restart</button>
        </div>
    </div>
    
    <div id="level-up-overlay">
        <div id="level-up-message">
            LEVEL UP!<br>
            <span id="level-up-level" style="font-size: 36px;">2</span>
        </div>
        <button id="continue-btn">Continue</button>
    </div>
    
    <div id="upgrade-selection-overlay">
        <div id="upgrade-selection-content">
            <h2 id="upgrade-title">Choose an Upgrade</h2>
            <div id="upgrade-choices"></div>
        </div>
    </div>
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.158.0/build/three.module.js"
        }
    }
    </script>
    
    <script type="module" src="game/main.js"></script>

</body>
</html>
